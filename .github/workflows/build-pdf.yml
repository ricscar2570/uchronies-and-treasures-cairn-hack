name: Build PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Liberation fonts
        run: sudo apt-get install -y fonts-liberation

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build PDF
        run: python scripts/build-pdf.py

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: UeT-Manual
          path: UeT_Final_Complete.pdf
          retention-days: 90

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Delete previous latest release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Manual — ${{ steps.date.outputs.date }}"
          body: |
            Latest build of the Uchronies & Treasures manual.
            Generated automatically from the `main` branch.
          files: UeT_Final_Complete.pdf
          make_latest: true
